name: Build and deploy ValveTrials.com

# Rebuilds the static site from trials.json and publishes it to GitHub Pages
# every time you push a change (e.g. an updated trials.json from the Editor).

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # lets you trigger a rebuild manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build the site into ./site
        run: python valve_trials.py site
      - name: Disable Jekyll processing
        run: touch site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
