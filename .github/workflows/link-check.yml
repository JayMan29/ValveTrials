name: Trial audit (verify primaries + find missing follow-ups)

# Checks EVERY published trial in one pass:
#   - is the stored primary DOI/PMID correct (cross-checked against the NCT registration)?
#   - which follow-up / subanalysis papers registered to that NCT are you missing?
# REVIEW ONLY: never edits trials.json / trials_*.json. Posts a downloadable report.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"      # 06:00 UTC on the 1st of each month

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Self-test the audit logic
        run: python audit.py --selftest
      - name: Audit every trial against PubMed
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}   # optional; only speeds up PubMed
        run: |
          python audit.py --files trials.json trials_*.json | tee audit-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: trial-audit-report
          path: audit-report.md
